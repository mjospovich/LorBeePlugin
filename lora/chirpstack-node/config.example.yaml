hardware:
  spi_channel: 1
  pins:
    cs: 17
    dio0: 22
    rst: 25

lorawan:
  region: EU868
  sub_band: 0
  uplink_interval_sec: 300

snapshot:
  path: /data/snapshot/latest.json
  device_ieee: ""

