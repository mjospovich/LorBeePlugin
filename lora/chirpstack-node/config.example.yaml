# Copy to config.yaml if you want a local template, or edit the repo config.yaml.
# Same schema as config.yaml — see lora/README.md.

hardware:
  spi_channel: 1
  pins:
    cs: 17
    dio0: 22
    rst: 25

lorawan:
  region: EU868
  sub_band: 0
  uplink_interval_sec: 300

snapshot:
  path: /data/snapshot/latest.json
  device_ieee: ""

payload:
  format: packed
  include_status: true
  max_bytes: 222
  entries:
    - id: 1
      device: "0x0011223344556677"
      type: climate
    # - id: 2
    #   device: "0x8899aabbccddeeff"
    #   type: motion
    # BME680 + SPS30 only (types 0x06 / 0x05 — see lora/README.md):
    # - id: 1
    #   device: "bme680"
    #   type: environment
    # - id: 2
    #   device: "sps30"
    #   type: air_quality_aqi
