# LorBeeOS stack — reference Docker deployment. Paths: see docs/lorbeeos-paths.md and .env.example
# LORBEE_STACK_ROOT = directory containing this file (default ".").
# LORBEE_SNAPSHOT_HOST = merged JSON on host (compose default ./data/snapshot if unset).

services:
  mosquitto:
    container_name: mosquitto
    image: eclipse-mosquitto:latest
    restart: unless-stopped
    network_mode: host
    environment:
      - TZ=${TZ:-Europe/Zagreb}
    volumes:
      - ${LORBEE_STACK_ROOT:-.}/mosquitto/data:/mosquitto/data
      - ${LORBEE_STACK_ROOT:-.}/mosquitto/config:/mosquitto/config
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mosquitto_pub -h 127.0.0.1 -p 1883 -t lorbee/__health -m 1 -q 1 -r && mosquitto_sub -h 127.0.0.1 -p 1883 -t lorbee/__health -C 1 -W 2",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # After Pi reboot: set ZIGBEE_SERIAL_DEVICE=/dev/serial/by-id/... in .env (not plain ttyUSB0).
  # The by-id path is bind-mounted so zigbee2mqtt sees the correct device even when
  # ttyUSB numbering changes (e.g. after adding SPS30 to the same USB hub).
  zigbee2mqtt:
    container_name: zigbee2mqtt
    image: koenkk/zigbee2mqtt:latest
    restart: unless-stopped
    privileged: true
    network_mode: host
    environment:
      - TZ=${TZ:-Europe/Zagreb}
      - ZIGBEE_SERIAL_DEVICE=${ZIGBEE_SERIAL_DEVICE:-/dev/ttyUSB0}
    volumes:
      - ${LORBEE_STACK_ROOT:-.}/zigbee2mqtt/data:/app/data
      - /run/udev:/run/udev:ro
      - /dev/serial:/dev/serial:ro
    group_add:
      - dialout
    depends_on:
      mosquitto:
        condition: service_healthy

  nodered:
    container_name: nodered
    image: nodered/node-red:latest
    restart: unless-stopped
    network_mode: host
    user: ${NODE_RED_USER:-1000:1000}
    environment:
      - TZ=${TZ:-Europe/Zagreb}
      - EDGE_ID=${EDGE_ID:-default}
    volumes:
      - ${LORBEE_STACK_ROOT:-.}/nodered/data:/data
      - ${LORBEE_SNAPSHOT_HOST:-./data/snapshot}:/data/snapshot
    depends_on:
      mosquitto:
        condition: service_healthy

  # Optional: SPS30 particulate matter sensor (UART/USB). Enable with: docker compose --profile sps30 up -d
  sps30-collector:
    profiles: ["sps30"]
    container_name: sps30-collector
    build:
      context: ${LORBEE_STACK_ROOT:-.}/sps30-collector
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: host
    environment:
      - TZ=${TZ:-Europe/Zagreb}
      - SPS30_SERIAL_PORT=${SPS30_SERIAL_DEVICE:-/dev/ttyUSB0}
      - MQTT_BROKER=localhost
      - MQTT_PORT=1883
      - SPS30_MQTT_TOPIC=${SPS30_MQTT_TOPIC:-sps30/raw}
      - SPS30_INTERVAL=${SPS30_INTERVAL:-30}
    devices:
      - ${SPS30_SERIAL_DEVICE:-/dev/ttyUSB0}:${SPS30_SERIAL_DEVICE:-/dev/ttyUSB0}
    group_add:
      - dialout
    depends_on:
      mosquitto:
        condition: service_healthy

  # Optional: BME680 temp/humidity/pressure/gas (I2C). Enable with: docker compose --profile bme680 up -d
  bme680-collector:
    profiles: ["bme680"]
    container_name: bme680-collector
    build:
      context: ${LORBEE_STACK_ROOT:-.}/bme680-collector
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: host
    environment:
      - TZ=${TZ:-Europe/Zagreb}
      - BME680_PROTOCOL=${BME680_PROTOCOL:-i2c}
      - BME680_I2C_DEVICE=${BME680_I2C_DEVICE:-/dev/i2c-1}
      - BME680_I2C_BUS=${BME680_I2C_BUS:-1}
      - BME680_I2C_ADDR=${BME680_I2C_ADDR:-0x76}
      - MQTT_BROKER=localhost
      - MQTT_PORT=1883
      - BME680_MQTT_TOPIC=${BME680_MQTT_TOPIC:-bme680/raw}
      - BME680_INTERVAL=${BME680_INTERVAL:-60}
    devices:
      - ${BME680_I2C_DEVICE:-/dev/i2c-1}:${BME680_I2C_DEVICE:-/dev/i2c-1}
    depends_on:
      mosquitto:
        condition: service_healthy

  # Optional: LoRaWAN OTAA node (RFM9x + SPI). Enable with: docker compose --profile lora up -d
  chirpstack-lora-node:
    profiles: ["lora"]
    container_name: chirpstack-lora-node
    build:
      context: ${LORBEE_STACK_ROOT:-.}/lora/chirpstack-node
      dockerfile: Dockerfile
      args:
        RADIOLIB_VERSION: "7.6.0"
        # Pi: keep 1 to avoid OOM during RadioLib (Docker exit 137). Faster machines: 2–4
        BUILD_JOBS: ${LORA_BUILD_JOBS:-1}
    restart: unless-stopped
    privileged: true
    network_mode: host
    environment:
      - TZ=${TZ:-Europe/Zagreb}
      - LORA_CONFIG=/etc/lora/config.yaml
      - LORAWAN_STATE_DIR=/data/lorawan-state
    volumes:
      - ${LORBEE_STACK_ROOT:-.}/lora/chirpstack-node/config.yaml:/etc/lora/config.yaml:ro
      - ${LORBEE_SNAPSHOT_HOST:-./data/snapshot}:/data/snapshot:ro
      - ${LORBEE_STACK_ROOT:-.}/data/lorawan-state:/data/lorawan-state
      - ${LORBEE_STACK_ROOT:-.}/data/downlink-commands:/data/downlink-commands
    env_file:
      - path: ${LORBEE_STACK_ROOT:-.}/lora/chirpstack-node/keys.env
        required: false
